name: Next Build Check

on:
  pull_request:
    branches:
      - develop

jobs:
  build:
    name: build next app
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: set up node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: restore yarn dependencies cache
        id: yarn-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: install dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

      - name: restore next build cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.next/cache
            .next/cache
          key: ${{ runner.os }}-nextjs-build-${{ hashFiles('**/yarn.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-build-${{ hashFiles('**/yarn.lock') }}-
            ${{ runner.os }}-nextjs-build-
        
      - name: run next build
        run: yarn build